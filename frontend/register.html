<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <h1>Somesite</h1>
  <h2>Register</h2>
  <form id="registerForm">
    <label>Username:<input type="text" id="username" required></label>

  </form>
  <p id="result"></p>
  <a href="/index.html">Hai già un account? Accedi</a>

  <!-- logica in js-->
  <script src="/js/register.js"></script>
</body>
</html>
